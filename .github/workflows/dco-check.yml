# 非阻断 DCO Signed-off-by 提示。
# 该 workflow 只帮助贡献者按 DCO 习惯补充 commit trailer，不应加入 required checks。
name: DCO Sign-off Advisory

run-name: "PR Validation Target #${{ github.event.pull_request.number || inputs.pr_number }} / ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect.
        required: true
      head_sha:
        description: Pull request head SHA expected by the matrix.
        required: false

concurrency:
  group: dco-signoff-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco-signoff-advisory:
    name: DCO Sign-off Advisory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create advisory app token
        id: advisory-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read
          permission-issues: write

      - name: Checkout trusted advisory script
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.advisory-token.outputs.token }}
          persist-credentials: false

      - name: Check commit sign-offs
        env:
          GH_TOKEN: ${{ steps.advisory-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node .github/scripts/dco-check.js
