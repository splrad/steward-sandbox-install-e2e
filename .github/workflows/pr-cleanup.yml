# 📋 复用到新项目时的配置步骤：
#   1) 复用 PR Automation 中同一个 GitHub App：
#      - WORKFLOW_AUTOMATION_APP_CLIENT_ID
#      - WORKFLOW_AUTOMATION_APP_PRIVATE_KEY
#      建议该 App 统一授予 Contents 读写、Pull requests 读写、Issues 读写、Checks 读写。
#   2) 本 workflow 在 PR 关闭时清理合并前门禁评论，并在 main 目标 PR 合并时写入结果通知。
#   3) 不要把本 workflow 的 job 设置为 required check；
#      它是合并后的清理流程，不是合并前门禁。
name: PR Cleanup

on:
  # 合并 main 目标 PR 时写结果通知。
  pull_request_target:
    branches:
      - main
    types: [closed]

concurrency:
  group: pr-cleanup-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  # 内置 GITHUB_TOKEN 只保留只读；写合并/失败原因评论使用 GitHub App token。
  contents: read

jobs:
  close-notification:
    name: Close Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 只处理 PR closed 事件，确保人工关闭 PR 时有关闭原因，合并关闭时写合并结果。
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_CLOSED_BY: ${{ github.event.sender.login }}
      PR_MERGED: ${{ github.event.pull_request.merged }}
      PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
      PR_MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}
    steps:
      - name: Create automation app token
        id: automation-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          # 用于读取 PR、写合并/失败原因评论、必要时重新打开未说明原因的 PR。
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout cleanup scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.automation-token.outputs.token }}
          persist-credentials: false

      - name: Cleanup governance comments and notify close status
        env:
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.automation-token.outputs.token }}
        run: node .github/scripts/pr-cleanup.js notify-close
