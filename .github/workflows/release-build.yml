# 📋 复用到新项目时的配置步骤：
#   1) 这条 Release workflow 包含当前项目专用发布逻辑。
#      跨仓库复用时，必须重点修改：
#      - on.pull_request_target.branches：目标仓库的默认发布分支
#      - on.pull_request_target.paths：哪个版本源变化代表“准备发布”
#      - Version.props：版本号读取来源；本项目只在它变化时自动发布
#      - tools/Publish-ReleaseAssets.ps1：构建/打包命令
#      - artifacts/ReleaseAssets 下的资产文件名检查
#      - release notes 中的固定下载说明
#   2) 保留的通用规则：
#      - 只允许来自已合并 PR 的默认分支提交发布
#      - tag 已存在时跳过发布
#      - Release notes 由 .github/scripts/generate-release-notes.ps1 生成
#      - 发布失败只保留 Actions 运行失败通知，不向 PR 额外评论
#   3) 复用 PR Automation 中同一个 GitHub App；Release 创建使用 App token。
#   4) 如果新项目不是 Version.props 版本源，需要修改 Read version and release state 步骤。
#   5) 如果新项目没有发布资产打包脚本，需要替换 Build deployer / Package release assets / Create GitHub Release。
#   6) 不要把 Release job 设置为 required check；
#      它是合并后的发布流程，不是 PR 合并门禁。
name: Release

on:
  pull_request_target:
    types: [closed]
    branches:
      - main
    # 自动发布只由版本源变化触发。
    # 普通源码、文档、workflow 或脚本变更会被后续版本发布一起打包，但不应单独触发 Release。
    # 复用到其他项目时，把这里替换为 package.json、Directory.Build.props 等“版本变更即发布”的文件。
    paths:
      - Version.props
concurrency:
  group: release-default-branch
  cancel-in-progress: false

permissions:
  # 内置 GITHUB_TOKEN 只保留只读；Release 创建和失败评论使用 GitHub App token。
  contents: read

jobs:
  release:
    name: Build Assets and Publish Release
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      merged_pr_number: ${{ steps.release-context.outputs.pr_number }}
      display_version: ${{ steps.version.outputs.display_version }}
      build_id: ${{ steps.version.outputs.build_id }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_title: ${{ steps.version.outputs.release_title }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Create release read app token
        id: release-read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          # 前置校验和发布说明只需要读取源码、Release 状态和 PR 元数据。
          permission-contents: read
          permission-pull-requests: read

      - name: Resolve merged PR release context
        id: release-context
        shell: pwsh
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_MERGED: ${{ github.event.pull_request.merged }}
          EVENT_PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          EVENT_BASE_SHA: ${{ github.sha }}
          REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REPOSITORY_DEFAULT_BRANCH)) {
              throw 'The repository default branch is unavailable.'
          }

          if ($env:EVENT_PR_MERGED -ne 'true' -or $env:EVENT_PR_BASE_REF -ne $env:REPOSITORY_DEFAULT_BRANCH) {
              throw "Automatic release requires a merged pull request targeting $env:REPOSITORY_DEFAULT_BRANCH."
          }
          $prNumber = $env:EVENT_PR_NUMBER
          $targetSha = $env:EVENT_BASE_SHA

          if ($targetSha -notmatch '^[a-f0-9]{40}$') {
              throw "Merged PR #$prNumber does not expose a valid release commit SHA."
          }

          "pr_number=$prNumber" >> $env:GITHUB_OUTPUT
          "target_sha=$targetSha" >> $env:GITHUB_OUTPUT
          "Resolved merged PR #$prNumber at $targetSha." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Checkout merged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ steps.release-read-token.outputs.token }}
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Confirm .NET SDK
        shell: pwsh
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Read version and release state
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.release-read-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 当前项目从 Version.props 读取 PluginDisplayVersion 与 PluginBuildId。
          # 复用到其他项目时，可改为 package.json、Directory.Build.props、Git tag 等版本源。
          [xml]$versionXml = Get-Content -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'Version.props') -Raw
          $displayVersion = [string]$versionXml.Project.PropertyGroup.PluginDisplayVersion
          $buildId = [string]$versionXml.Project.PropertyGroup.PluginBuildId
          if ([string]::IsNullOrWhiteSpace($displayVersion) -or [string]::IsNullOrWhiteSpace($buildId)) {
              throw 'Version.props is missing PluginDisplayVersion or PluginBuildId.'
          }
          if ($displayVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "PluginDisplayVersion must use X.Y.Z format. Current value: $displayVersion"
          }

          $tagName = "v$displayVersion"
          $releaseTitle = "AFR v$displayVersion ($buildId)"
          $latestTag = gh release list --repo $env:GH_REPO --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""'
          $existingRelease = gh release view $tagName --repo $env:GH_REPO --json tagName --jq '.tagName' 2>$null
          if ($LASTEXITCODE -ne 0) {
              $global:LASTEXITCODE = 0
              $existingRelease = ''
          }

          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          "build_id=$buildId" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT
          "latest_tag=$latestTag" >> $env:GITHUB_OUTPUT

          if (-not [string]::IsNullOrWhiteSpace($existingRelease)) {
              "should_release=false" >> $env:GITHUB_OUTPUT
              "Release $tagName already exists; skipping build and publish." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
              exit 0
          }

          "should_release=true" >> $env:GITHUB_OUTPUT
          "Preparing Release $tagName." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Build deployer
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        # 当前项目专用打包脚本；复用时替换为你的构建/打包命令。
        run: ./tools/Publish-ReleaseAssets.ps1

      - name: Package release assets
        if: steps.version.outputs.should_release == 'true'
        id: package
        shell: pwsh
        run: |
          # 当前项目专用发布资产名；复用时改为目标项目实际需要上传的文件。
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $assetDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/ReleaseAssets'
          $exeAssetPath = Join-Path $assetDir "AFR-Deployer_$tagName.exe"
          $dllZipAssetPath = Join-Path $assetDir "AFR-DLL_$tagName.zip"
          $fontsAssetPath = Join-Path $assetDir 'Fonts.zip'

          foreach ($asset in @(
              @{ Path = $exeAssetPath; Name = 'deployer exe' },
              @{ Path = $dllZipAssetPath; Name = 'plugin dll zip' },
              @{ Path = $fontsAssetPath; Name = 'fonts zip' }
          )) {
              if (-not (Test-Path -LiteralPath $asset.Path)) {
                  throw "Missing release asset: $($asset.Name) at $($asset.Path)"
              }
              if ((Get-Item -LiteralPath $asset.Path).Length -le 0) {
                  throw "Release asset is empty: $($asset.Path)"
              }
          }

          "exe_path=$exeAssetPath" >> $env:GITHUB_OUTPUT
          "dll_zip_path=$dllZipAssetPath" >> $env:GITHUB_OUTPUT
          "fonts_path=$fontsAssetPath" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.version.outputs.should_release == 'true'
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.release-read-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
        run: |
          # 只保留运行代码相关 PR；纯 workflow、文档、版本号 PR 不进入发布说明。
          $notesPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'

          try {
              & (Join-Path $env:GITHUB_WORKSPACE '.github/scripts/generate-release-notes.ps1') `
                  -Repo $env:GH_REPO `
                  -TagName $env:TAG_NAME `
                  -PreviousTag $env:LATEST_TAG `
                  -TargetSha '${{ steps.release-context.outputs.target_sha }}' `
                  -TriggerPrNumber '${{ steps.release-context.outputs.pr_number }}' `
                  -OutputPath $notesPath `
                  -OwnerLogin '${{ github.repository_owner }}'
          } catch {
              @(
                  '## 插件变更'
                  ''
                  '- 本版本发布说明生成失败，已使用最小发布说明兜底。'
                  ''
                  '> 自动发布过程中生成详细发布说明失败；请查看 GitHub Actions 运行日志。'
              ) | Set-Content -LiteralPath $notesPath -Encoding utf8

              $errorMessage = ($_.Exception.Message -replace "\r?\n", ' ')
              "Release notes generation failed; wrote fallback notes." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
              "Error: $errorMessage" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          }

          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create release publish app token
        if: steps.version.outputs.should_release == 'true'
        id: release-publish-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          # 仅发布步骤需要写 Contents 来创建 Release 和上传资产。
          permission-contents: write

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.release-publish-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 将上一步检查过的资产全部上传到同一个 GitHub Release。
          gh release create '${{ steps.version.outputs.tag_name }}' `
              '${{ steps.package.outputs.exe_path }}' `
              '${{ steps.package.outputs.dll_zip_path }}' `
              '${{ steps.package.outputs.fonts_path }}' `
              --repo $env:GH_REPO `
              --target '${{ steps.release-context.outputs.target_sha }}' `
              --title '${{ steps.version.outputs.release_title }}' `
              --notes-file '${{ steps.notes.outputs.notes_path }}' `
              --latest

          "Created Release ${{ steps.version.outputs.tag_name }}." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
