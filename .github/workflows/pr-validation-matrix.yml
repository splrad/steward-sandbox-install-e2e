# 检查当前 PR head 的合并前验证矩阵是否完整、新鲜、可信。
# ruleset required check 应配置为 `PR Validation Matrix Gate`。
# 本 workflow 是唯一允许用 Actions: write 调度或重新运行其它 workflow 的仓库自动化入口。
# review/comment 状态由 GitHub App webhook relay 转为 repository_dispatch；
# PR Review Signal 只保留 reviewer request 变化的无密钥入口。
name: PR Validation Matrix

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited, labeled, unlabeled]
  workflow_run:
    workflows: ["PR Classification", "DCO Sign-off Advisory", "PR Governance", "PR Review Signal"]
    types: [completed]
  check_run:
    types: [completed, rerequested]
  repository_dispatch:
    types: [pr-review-state-changed, pr-review-thread-resolved]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect.
        required: true
      head_sha:
        description: Optional current PR head SHA expected by the matrix.
        required: false
      scope:
        description: auto, full, or gate-only.
        required: false
        default: auto
      mode:
        description: observe, repair, or enforce.
        required: false
        default: enforce

concurrency:
  group: >-
    pr-validation-matrix-${{
      (github.event_name == 'check_run'
        && github.event.action == 'completed'
        && contains(fromJSON('["PR Validation Matrix Gate", "Evaluate PR Validation Matrix"]'), github.event.check_run.name)
        && format('Ignored Matrix Check {0}', github.run_id))
      || (github.event.pull_request.number && format('PR Validation Target #{0} / {1}', github.event.pull_request.number, github.event.pull_request.head.sha))
      || (github.event.workflow_run.pull_requests[0].number && format('PR Validation Target #{0} / {1}', github.event.workflow_run.pull_requests[0].number, github.event.workflow_run.head_sha))
      || (github.event.check_run.pull_requests[0].number && format('PR Validation Target #{0} / {1}', github.event.check_run.pull_requests[0].number, github.event.check_run.head_sha))
      || (github.event.client_payload.pr_number && format('PR Validation Target #{0} / {1}', github.event.client_payload.pr_number, github.event.client_payload.head_sha))
      || (inputs.pr_number && format('PR Validation Target #{0} / {1}', inputs.pr_number, inputs.head_sha))
      || (github.event.workflow_run.name == 'PR Review Signal' && format('Untrusted Review Signal {0}', github.event.workflow_run.id))
      || github.event.workflow_run.display_title
      || github.run_id
    }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-matrix:
    name: Evaluate PR Validation Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (
        github.event_name != 'check_run' ||
        (
          github.event.check_run.pull_requests[0].number &&
          (
            github.event.action == 'rerequested' ||
            !contains(fromJSON('["PR Validation Matrix Gate", "Evaluate PR Validation Matrix"]'), github.event.check_run.name)
          )
        )
      )
    permissions:
      contents: read
    steps:
      - name: Create validation app token
        id: validation-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read
          permission-checks: write
          permission-actions: write

      - name: Checkout trusted validation scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts
            .github/pr-validation-matrix.json
          sparse-checkout-cone-mode: false
          token: ${{ steps.validation-token.outputs.token }}
          persist-credentials: false

      - name: Evaluate PR validation matrix
        env:
          GH_TOKEN: ${{ steps.validation-token.outputs.token }}
          GH_CHECKS_TOKEN: ${{ steps.validation-token.outputs.token }}
          GH_ACTIONS_TOKEN: ${{ steps.validation-token.outputs.token }}
          VALIDATION_MATRIX_APP_SLUG: ${{ steps.validation-token.outputs.app-slug }}
          REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.check_run.pull_requests[0].number }}
          WORKFLOW_INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          WORKFLOW_INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
          VALIDATION_MATRIX_MODE: ${{ inputs.mode || 'enforce' }}
          VALIDATION_MATRIX_SCOPE: ${{ inputs.scope || 'auto' }}
        run: node .github/scripts/pr-validation-matrix.js --apply
