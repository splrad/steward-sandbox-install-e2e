name: Deploy Webhook Relay

on:
  push:
    branches: [main]
    paths:
      - .github/webhook-relay/**
      - .github/workflows/deploy-webhook-relay.yml
  workflow_dispatch:

concurrency:
  group: deploy-webhook-relay
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Test and Deploy Worker
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .github/webhook-relay
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .github/webhook-relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test relay
        run: npm test

      - name: Type-check relay
        run: npm run typecheck

      - name: Deploy relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
