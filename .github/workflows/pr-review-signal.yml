# reviewer request 变化不会由 Copilot bot 触发，可继续通过无密钥轻量 workflow
# 转换为 Matrix workflow_run。Review、review comment 和 conversation 事件由
# GitHub App webhook relay 直接发送 repository_dispatch，避免 bot 事件 action_required。
name: PR Review Signal

run-name: "PR Review Signal #${{ github.event.pull_request.number }} / ${{ github.event.pull_request.head.sha }} / ${{ github.event_name }} / ${{ github.event.action }}"

on:
  pull_request:
    types: [review_requested, review_request_removed]

concurrency:
  group: pr-review-signal-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  signal:
    name: Record Review State Change
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Record review signal
        run: |
          echo "Review state changed for PR #${{ github.event.pull_request.number }} at ${{ github.event.pull_request.head.sha }}" >> "$GITHUB_STEP_SUMMARY"
