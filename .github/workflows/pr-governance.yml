name: PR Governance

run-name: "PR Validation Target #${{ github.event.pull_request.number || github.event.inputs.pr_number }} / ${{ github.event.pull_request.head.sha || github.event.inputs.head_sha }}"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect.
        required: true
        type: number
      head_sha:
        description: Expected current pull request head SHA.
        required: true
        type: string
      governance_scope:
        description: Governance target scope.
        required: false
        default: all
        type: choice
        options:
          - all
          - main-authorization
          - copilot-review

permissions:
  contents: read

jobs:
  govern:
    uses: splrad/steward/.github/workflows/pr-governance.yml@4c59d2d2f1dd89c812219e9782757b63a8f6ac56
    with:
      app_client_id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
      pr_number: ${{ github.event.pull_request.number || fromJSON(github.event.inputs.pr_number || '0') }}
      head_sha: ${{ github.event.pull_request.head.sha || github.event.inputs.head_sha }}
      governance_scope: ${{ github.event.inputs.governance_scope || 'all' }}
    secrets:
      app_private_key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
      copilot_review_request_token: ${{ secrets.COPILOT_REVIEW_REQUEST_TOKEN }}
      core_auto_approval_token: ${{ secrets.CORE_AUTO_APPROVAL_TOKEN }}
