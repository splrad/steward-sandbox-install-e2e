# 📋 复用到新项目时的配置步骤：
#   1) 在仓库 Variables 中配置 TRUSTED_DEVELOPERS，格式为 JSON 数组：
#      ["your-login", "another-login"]。
#      该名单用于自动 APPROVE 和 main 授权门禁；只要真实贡献者中有 1 人不在名单内，
#      就必须由核心开发者手动 approval。
#   2) 内置 GITHUB_TOKEN 只保留 contents: read。
#      PR 审查、评论、Copilot request 和 Checks API 写操作均使用下面的 GitHub App token。
#   3) 配置 PR Automation 复用的 GitHub App：
#      - WORKFLOW_AUTOMATION_APP_CLIENT_ID
#      - WORKFLOW_AUTOMATION_APP_PRIVATE_KEY
#      该 App 必须安装到本仓库，并建议授予仓库权限：
#      Contents: Read and write；Pull requests: Read and write；
#      Issues: Read and write；Checks: Read and write；Actions: Read and write。
#      本 workflow 用该 App 的短期 installation token 请求 GitHub Copilot Code Review，
#      并维护 Copilot Code Review Gate 自定义 check run。Actions: write 只应由
#      PR Validation Matrix workflow 使用，用于集中批准/重跑需要恢复的 workflow run。
#   4) 分支保护 / ruleset 的集中 required check 建议配置为：
#      - main: PR Validation Matrix Gate，source 必须选本 GitHub App 或 Any source；
#        该 check 确认当前 head 的 PR 验证矩阵完整、新鲜、可信，并集中处理必要重跑/主动触发。
#      Main Authorization Gate / Copilot Code Review Gate 可以保留为可见目标检查；
#      若依赖矩阵主动 workflow_dispatch 兜底，最终合并判断应以 PR Validation Matrix Gate 为准。
#      CodeQL 使用 GitHub Advanced Security default setup 和 ruleset 的
#      Require code scanning results 管理，不再维护本仓库自定义 CodeQL workflow。
#      不要把 Auto Approve 或 Update Copilot Review Check 设置为 required check。
#   5) Copilot Code Review Gate 只检查 main 目标 PR。
#      本 workflow 会通过 REST API 显式请求 Copilot Code Review；ruleset 自动审查仍可兜底人工 PR。
#      重要：GitHub 会静默忽略 GitHub App installation token 发起的 Copilot review request
#      （API 返回成功但不产生 review_requested 事件），且 ruleset 自动审查不覆盖 bot 创建的 PR。
#      因此必须配置仓库 secret COPILOT_REVIEW_REQUEST_TOKEN：
#      一个拥有 Copilot 订阅的用户的 fine-grained PAT，仓库权限 Pull requests: Read and write。
#      未配置该 secret 时请求 job 会立即失败，不回退到会被静默忽略的 App token。
#      它依赖 .github/copilot-instructions.md
#      要求 Copilot 审查正文主体使用简体中文，并在 inline comment 前两行标注：
#      - 严重程度：阻断 / Severity: blocking
#      - 严重程度：建议 / Severity: suggestion
#      - 标题：简短问题摘要 / Title: concise issue summary
#      该严重程度是本仓库自定义协议，不是 Copilot 官方结构化字段，也不依赖 Low/Medium 等 UI 徽标。
#   6) 配置 CORE_AUTO_APPROVAL_TOKEN：
#      一个核心开发者的 fine-grained PAT，仓库权限 Pull requests: Read and write。
#      只有全部真实贡献者都在 TRUSTED_DEVELOPERS 时，才会用该 PAT 提交带
#      workflow:auto-approval 标记的 GitHub 原生 approval。
#   7) 如果 GitHub App 创建 PR 导致 PR 作者显示为 bot，PR Automation 会在 PR 正文写入
#      workflow:source-actor / workflow:source-contributors 隐藏标记；本 workflow 还会合并
#      PR commits 中关联到 GitHub 账号的 author login，再按真实贡献者集合判断 TRUSTED_DEVELOPERS。
name: PR Governance

run-name: "PR Validation Target #${{ github.event.pull_request.number || inputs.pr_number }} / ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}"

on:
  # pull_request_target 允许在受保护的默认分支上下文中读取治理脚本、提交审批和失败通知。
  # 脚本 checkout 固定到 base.sha，避免执行来自 PR head 的不可信 workflow 脚本。
  # opened/synchronize/reopened/ready_for_review 属于当前 head 的完整治理验证入口。
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  # review / review comment / conversation 事件由 GitHub App webhook relay
  # 转为 Matrix repository_dispatch，再由验证矩阵安全调度本 workflow。
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect.
        required: true
      head_sha:
        description: Pull request head SHA expected by the matrix.
        required: false
      governance_scope:
        description: all, main-authorization, or copilot-review.
        required: false
        default: all

concurrency:
  group: pr-governance-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # 以下 PR 上下文供 .github/scripts/pr-governance.js 使用。
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
  PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
  PR_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha || '' }}
  TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}

jobs:
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # ruleset 自动审查对 GitHub App / bot 作者不可靠；这里显式请求官方 Copilot reviewer。
    # 该 job 不作为 required check；Copilot Code Review Gate 自定义 check run 负责最终阻断。
    if: >-
      (
        (
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'main'
        ) ||
        github.event_name == 'workflow_dispatch'
      ) &&
      inputs.governance_scope != 'main-authorization'
    steps:
      - name: Create Copilot review app token
        id: copilot-review-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.copilot-review-token.outputs.token }}
          persist-credentials: false

      - name: Request Copilot code review
        env:
          # GitHub 会静默忽略 App token 的 Copilot review request；必须使用有 Copilot 订阅的用户 PAT。
          GH_TOKEN: ${{ secrets.COPILOT_REVIEW_REQUEST_TOKEN }}
          GH_READ_TOKEN: ${{ steps.copilot-review-token.outputs.token }}
          # 由脚本通过 gh api user 解析 PAT 对应的实际请求账号。
          EXPECTED_REQUEST_ACTOR: ''
        run: node .github/scripts/pr-governance.js request-copilot-review

  auto-approve:
    name: Auto Approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # 该 job 不能作为 required check；它只负责在全部真实贡献者均为核心开发者时，
    # 用 CORE_AUTO_APPROVAL_TOKEN 提交 GitHub 原生 approval。
    if: >-
      (github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch') &&
      inputs.governance_scope != 'copilot-review'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Submit approval for trusted author
        env:
          GH_TOKEN: ${{ secrets.CORE_AUTO_APPROVAL_TOKEN }}
          GH_READ_TOKEN: ${{ steps.governance-token.outputs.token }}
        run: node .github/scripts/pr-governance.js auto-approve

  main-authorization-gate:
    name: Main Authorization Gate
    needs: auto-approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # main 目标 PR 必须满足：真实贡献者可识别；若全部真实贡献者均为核心开发者，
    # 当前 head 需要核心开发者 approval（可由 CORE_AUTO_APPROVAL_TOKEN 自动提交）；
    # 若存在任一非核心贡献者，则当前 head 必须有核心开发者手动 approval。
    # 缺少 approval 时，该 job 会向尚未被请求且可审批的核心开发者发送 Review Request。
    if: >-
      always() &&
      (
        (
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'main'
        ) ||
        github.event_name == 'workflow_dispatch'
      ) &&
      inputs.governance_scope != 'copilot-review'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          # 在 PR 上创建/更新 issue comment 需要 App 的 Pull requests: write（Issues: write 只覆盖真正的 issue）。
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Check main authorization and request core reviews
        env:
          GH_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.governance-token.outputs.token }}
        run: node .github/scripts/pr-governance.js main-authorization

  copilot-review-check:
    name: Update Copilot Review Check
    needs:
      - request-copilot-review
      - main-authorization-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: copilot-review-check-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
      cancel-in-progress: true
    # Copilot Code Review 本身只会 comment，不会作为 approval/request-changes 阻断合并。
    # 因此这里通过 Checks API 维护自定义 required check: Copilot Code Review Gate。
    # 该 job 自身不作为 required check；它只负责把自定义 check run 更新为
    # in_progress / success / failure。
    # 该门禁不长时间轮询 Copilot；首次未检测到 review 时保持自定义 check in_progress，
    # 等 Copilot 提交 review 后，由下面的 review 事件重新触发并完成同名 required check。
    # 会自动重跑的场景：
    # - Copilot 延迟提交 review: pull_request_review submitted
    # - 用户接受建议并推送修正: pull_request_target synchronize
    # Resolve conversation 由 GitHub App webhook relay 转为 repository_dispatch 并触发验证矩阵。
    # 缺少“严重程度：阻断/建议”或 “Severity: blocking/suggestion” 的当前 Copilot 评论
    # 视为审查协议不完整并阻断，避免未知模板被误放行。
    if: >-
      always() &&
      (
        (
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.ref == 'main'
        ) ||
        github.event_name == 'workflow_dispatch'
      ) &&
      inputs.governance_scope != 'main-authorization'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          # 在 PR 上创建/更新 issue comment 需要 App 的 Pull requests: write（Issues: write 只覆盖真正的 issue）。
          permission-pull-requests: write
          permission-issues: write
          permission-checks: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Update Copilot review check run
        env:
          GH_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_CHECKS_TOKEN: ${{ steps.governance-token.outputs.token }}
          CHECK_RUN_APP_SLUG: ${{ steps.governance-token.outputs.app-slug }}
          COPILOT_REVIEW_CHECK_NAME: Copilot Code Review Gate
          REQUEST_COPILOT_RESULT: ${{ needs.request-copilot-review.result }}
        run: node .github/scripts/pr-governance.js copilot-review
